services:
  openmaic:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      # Optional: mount server-providers.yml for provider config
      # - ./server-providers.yml:/app/server-providers.yml:ro
      - openmaic-data:/app/data
    restart: unless-stopped

  # Optional: MinerU for advanced document parsing (tables, formulas, OCR)
  # Uncomment to enable:
  #
  # mineru:
  #   image: opendatalab/mineru:latest
  #   ports:
  #     - "8080:8080"
  #   restart: unless-stopped

volumes:
  openmaic-data:
